<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catégorie | Mistral</title>
    <meta name="description" content="Articles Mistral classés par catégorie" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:title" content="Catégorie | Mistral" />
    <meta property="og:description" content="Articles classés par catégorie sur Mistral." />
    <meta property="og:image" content="./social-preview.svg" />
    <meta property="og:url" content="./category.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Catégorie | Mistral" />
    <meta name="twitter:description" content="Articles classés par catégorie sur Mistral." />
    <meta name="twitter:image" content="./social-preview.svg" />
    <link rel="canonical" id="canonical-link" href="./category.html" />
    <link rel="icon" type="image/png" href="./logo mistral.PNG" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="./index.html" aria-label="Accueil Mistral">
          <img class="brand__logo" src="./logo mistral.PNG" alt="Logo Mistral" />
          <span class="brand__name">Mistral</span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="primary-nav"
          aria-label="Ouvrir le menu"
        >
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="primary-nav" aria-label="Navigation principale">
          <ul>
            <li><a href="./category.html?tag=Politique">Politique</a></li>
            <li><a href="./category.html?tag=%C3%89conomie">Économie</a></li>
            <li><a href="./category.html?tag=Urbanisme">Urbanisme</a></li>
            <li><a href="./category.html?tag=Mobilit%C3%A9s">Mobilités</a></li>
            <li><a href="./category.html?tag=Culture">Culture</a></li>
            <li><a href="./category.html?tag=Quartiers">Quartiers</a></li>
          </ul>
        </nav>

        <a class="search-bar category-home-link" href="./index.html" aria-label="Retour à l'accueil">
          Retour à l'accueil
        </a>
      </div>
    </header>

    <main class="category-page">
      <nav class="breadcrumb" aria-label="Fil d'Ariane">
        <ol>
          <li><a href="./index.html">Accueil</a></li>
          <li id="breadcrumb-current" aria-current="page">Catégorie</li>
        </ol>
      </nav>

      <div class="category-page__head">
        <p class="eyebrow">CATÉGORIE</p>
        <h1 id="category-title">#Catégorie</h1>
        <p class="category-page__lead" id="category-lead"></p>
      </div>

      <div class="category-controls">
        <div class="view-toggle" role="group" aria-label="Mode d'affichage des articles">
          <button type="button" data-view-option="grid" aria-pressed="true">Vue grille</button>
          <button type="button" data-view-option="list" aria-pressed="false">Vue liste</button>
        </div>

        <section class="tag-filters" aria-label="Filtres par tags">
          <p class="tag-filters__title">Affiner par tags</p>
          <div class="tag-filters__chips" id="tag-filters-chips"></div>
          <button class="tag-filters__reset" id="tag-filters-reset" type="button">Effacer filtres</button>
        </section>
      </div>

      <section class="article-grid" id="category-grid" aria-live="polite"></section>

      <div class="loading-indicator" id="category-loading" aria-hidden="true">
        Chargement des articles...
      </div>
      <div class="sentinel" id="category-sentinel" aria-hidden="true"></div>

      <section class="newsletter-panel">
        <h2>Recevoir la newsletter</h2>
        <p>Chaque semaine, notre sélection d'articles et de sources officielles.</p>
        <form class="newsletter-form" data-newsletter-form novalidate>
          <label class="sr-only" for="newsletter-email-category">Email newsletter</label>
          <input
            id="newsletter-email-category"
            data-newsletter-email
            type="email"
            name="email"
            placeholder="Votre email"
            autocomplete="email"
            required
          />
          <label class="newsletter-consent">
            <input data-newsletter-consent type="checkbox" required />
            J'accepte de recevoir les emails de Mistral.
          </label>
          <button type="submit">S'inscrire</button>
          <p class="newsletter-feedback" data-newsletter-feedback aria-live="polite"></p>
        </form>
      </section>
    </main>

    <button class="back-to-top" id="back-to-top" type="button" aria-label="Retour en haut">
      Retour en haut
    </button>

    <template id="article-card-template">
      <article class="article-card">
        <a class="article-card__link" href="#">
          <div class="article-card__image-wrap">
            <img
              class="article-card__image"
              alt=""
              loading="lazy"
              decoding="async"
              width="800"
              height="600"
            />
          </div>
          <div class="article-card__meta">
            <h3 class="article-card__title"></h3>
            <p class="article-card__excerpt"></p>
            <p class="article-card__byline"></p>
            <p class="article-card__date"></p>
            <p class="caption article-card__caption"></p>
          </div>
        </a>
        <p class="article-tags article-card__tags"></p>
      </article>
    </template>

    <script type="module" src="./category.js"></script>
    <script type="module" src="./newsletter.js"></script>
  </body>
</html>
