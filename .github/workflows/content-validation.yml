name: Content Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate and build static site
        run: npm run build

      - name: Front regression smoke tests
        run: npm run test:front
