<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categorie | Mistral</title>
    <meta name="description" content="Articles Mistral classes par categorie" />
    <link rel="icon" type="image/png" href="./logo mistral.PNG" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="./index.html" aria-label="Accueil Mistral">
          <img class="brand__logo" src="./logo mistral.PNG" alt="Logo Mistral" />
          <span class="brand__name">Mistral</span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="primary-nav"
          aria-label="Ouvrir le menu"
        >
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="primary-nav" aria-label="Navigation principale">
          <ul>
            <li><a href="./category.html?tag=Politique">Politique</a></li>
            <li><a href="./category.html?tag=%C3%89conomie">Économie</a></li>
            <li><a href="./category.html?tag=Urbanisme">Urbanisme</a></li>
            <li><a href="./category.html?tag=Mobilit%C3%A9s">Mobilités</a></li>
            <li><a href="./category.html?tag=Culture">Culture</a></li>
            <li><a href="./category.html?tag=Quartiers">Quartiers</a></li>
          </ul>
        </nav>

        <a class="search-bar category-home-link" href="./index.html" aria-label="Retour accueil">
          Retour accueil
        </a>
      </div>
    </header>

    <main class="category-page">
      <div class="category-page__head">
        <p class="eyebrow">CATEGORIE</p>
        <h1 id="category-title">#Categorie</h1>
        <p class="category-page__lead" id="category-lead"></p>
      </div>

      <section class="article-grid" id="category-grid" aria-live="polite"></section>

      <div class="loading-indicator" id="category-loading" aria-hidden="true">
        Chargement des articles...
      </div>
      <div class="sentinel" id="category-sentinel" aria-hidden="true"></div>
    </main>

    <template id="article-card-template">
      <article class="article-card">
        <a class="article-card__link" href="#">
          <div class="article-card__image-wrap">
            <img class="article-card__image" alt="" loading="lazy" />
          </div>
          <div class="article-card__meta">
            <h3 class="article-card__title"></h3>
            <p class="article-card__excerpt"></p>
            <p class="article-card__date"></p>
            <p class="caption article-card__caption"></p>
          </div>
        </a>
        <p class="article-tags article-card__tags"></p>
      </article>
    </template>

    <script type="module" src="./category.js"></script>
  </body>
</html>
